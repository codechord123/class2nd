      const defaultRankingConfigs = [
        { id: 1, title: "전체 상점 Top5", type: "cumulative", keyword: "" },

      ];
      const [rankingConfigs, setRankingConfigs] = useState(defaultRankingConfigs);

      const defaultSilverRewards = { 10: "간식 1개", 20: "자리 우선 선택권", 30: "숙제 면제권 1회", 40: "음료수 교환권", 50: "자유시간 10분", 60: "음악 신청권", 70: "보드게임 1회권", 80: "선생님과 산책", 90: "영화 감상권(개인)", 100: "문화상품권 5천원" };
      const defaultGoldRewards = { 10: "체육시간 10분 연장", 20: "점심시간 10분 연장", 30: "학급 보드게임 1시간", 40: "아이스크림 파티", 50: "영화 감상 (1교시)", 60: "피자 파티", 70: "숙제 없는 날", 80: "체육대회", 90: "야외 수업", 100: "과자 파티 및 자율활동" };

      const [silverRewards, setSilverRewards] = useState(defaultSilverRewards);
      const [goldRewards, setGoldRewards] = useState(defaultGoldRewards);

      const [loginTab, setLoginTab] = useState("student");
      const [selectedId, setSelectedId] = useState(1);
      const [passwordInput, setPasswordInput] = useState("");
      const [error, setError] = useState("");

      const [teacherTab, setTeacherTab] = useState("overview"); 
      const [studentTab, setStudentTab] = useState("overview"); 
      const [studentReadingSubTab, setStudentReadingSubTab] = useState("write");
      const [scoreBoardDate, setScoreBoardDate] = useState(getLocalDateString(new Date()));
      const [gridConfig, setGridConfig] = useState(new Array(35).fill(1));
      const [isLayoutEditMode, setIsLayoutEditMode] = useState(false);

      const invalidateCache = () => {
          sessionStorage.removeItem('cachedMainState');
      };

      const linkify = (text) => {
        if (!text) return "";
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.split(urlRegex).map((part, index) => {
          if (part.match(urlRegex)) {
            return <a key={index} href={part} target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:text-blue-700 underline break-all" onClick={(e) => e.stopPropagation()}>{part}</a>;
          }
          return part;
        });
      };

      const robustShuffle = (array) => {
        let newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
      };

      // =========================================================
      // 2. DB 마이그레이션 및 동기화 (Firebase Effects)
      // =========================================================
      
      const loadSavedSeating = async () => {
        try {
          const snap = await getDocs(collection(db, "savedClassroomSeating"));
          const data = {};
          snap.docs.forEach(doc => { data[doc.id] = doc.data().layout; });
          setSavedClassroomSeating(data);
        } catch(e) {}
      };

      const loadLunchHistory = async () => {
        try {
          const snap = await getDocs(collection(db, "lunchHistory"));
          const data = {};
          snap.docs.forEach(doc => { data[doc.id] = doc.data(); });
          setLunchHistory(data);
        } catch(e) {}
      };

      // ✨ 선생님: 선택한 날짜 + 승인 대기중인 데이터만 로드 (불필요한 데이터 읽기 방지)
      const loadTeacherCoinRequests = async (dateStr) => {
        if (!db) return;
        try {
          const targetDate = new Date(dateStr);
          targetDate.setHours(0, 0, 0, 0);
          const startOfDay = targetDate.getTime();
          const endOfDay = startOfDay + 24 * 60 * 60 * 1000 - 1;

          // 1. 캘린더에서 선택한 특정 날짜의 기록
          const qDate = query(collection(db, "coinRequests"), where("id", ">=", startOfDay), where("id", "<=", endOfDay));
          // 2. 다른 날짜에 요청되었지만 아직 선생님이 처리(승인/거절) 안 한 대기중인 기록
          const qPending = query(collection(db, "coinRequests"), where("status", "==", "pending"));

          const [snapDate, snapPending] = await Promise.all([getDocs(qDate), getDocs(qPending)]);
          
          const reqMap = new Map();
          snapDate.docs.forEach(d => reqMap.set(d.id, d.data()));
          snapPending.docs.forEach(d => reqMap.set(d.id, d.data()));

          const allReqs = Array.from(reqMap.values());
          allReqs.sort((a, b) => b.id - a.id);
          setCoinRequests(allReqs);
        } catch(e) { console.error("코인 요청 로드 에러:", e); }
      };

      const loadStudentCoinRequests = async (studentId) => {
        if (!db) return;
        try {
          const q = query(collection(db, "coinRequests"), where("studentId", "==", studentId));
          const snap = await getDocs(q);
          const reqs = snap.docs.map(d => d.data());
          reqs.sort((a,b) => b.id - a.id);
          setCoinRequests(reqs.slice(0, 50)); // 최신 50개만 메모리 상에서 자르기
        } catch(e) { console.error("학생 코인 요청 로드 에러:", e); }
      };

      useEffect(() => {
        if (!auth) { setIsDBLoaded(true); return; }
        signInAnonymously(auth).catch(() => setIsDBLoaded(true));
        const unsubscribe = onAuthStateChanged(auth, (user) => { setDbUser(user); if (!user) setIsDBLoaded(true); });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!dbUser || !db) return;
        const qSug = query(collection(db, "suggestions"), orderBy("id", "desc"), limit(suggestionLimit));
        const unsubSug = onSnapshot(qSug, (snap) => {
          setSuggestions(snap.docs.map(d => d.data()));
          setHasMoreSuggestions(snap.docs.length === suggestionLimit);
        });
        return () => unsubSug();
      }, [dbUser, suggestionLimit]);

      useEffect(() => {
        if (!dbUser || !db) return;
        const qRep = query(collection(db, "readingReports"), orderBy("id", "desc"), limit(reportLimit));
        const unsubRep = onSnapshot(qRep, (snap) => {
          setReadingReports(snap.docs.map(d => d.data()));
          setHasMoreReports(snap.docs.length === reportLimit);
        });
        return () => unsubRep();
      }, [dbUser, reportLimit]);

      useEffect(() => {

        if (authStatus.type === "teacher" && teacherTab === "coin_manage") {
          loadTeacherCoinRequests(coinManageDate);
        } else if (authStatus.type === "student" && studentTab === "shop") {
          loadStudentCoinRequests(authStatus.user.id);
        }

      const applyMainState = (data) => {
        if (data.teacherPassword !== undefined) setTeacherPassword(String(data.teacherPassword));
        if (data.students && Array.isArray(data.students) && data.students.length > 0) {
          const mergedStudents = data.students.map((s) => ({ ...s, isLocked: s.isLocked || false, gender: genderMap[s.name] || s.gender || "M" }));
          setStudents(mergedStudents); 
        }
        setRecords(data.records || {});
        setSpentTokens(data.spentTokens || {});
        if (data.spentClassGoldTokens !== undefined) setSpentClassGoldTokens(data.spentClassGoldTokens);
        if (data.silverRewards) setSilverRewards(data.silverRewards);
        if (data.goldRewards) setGoldRewards(data.goldRewards);
        if (data.rolePool) setRolePool(data.rolePool); 
        if (data.gridConfig) setGridConfig(data.gridConfig);
        setBooksRead(data.booksRead || {});
        if (data.classroomSeating) setClassroomSeating(data.classroomSeating);
        if (data.secretClassroomSeating) setSecretClassroomSeating(data.secretClassroomSeating);
        if (data.lockedSeats) setLockedSeats(data.lockedSeats);
        setClassroomHistory(data.classroomHistory || {});
        if (data.readingCharLimit !== undefined) setReadingCharLimit(data.readingCharLimit);
        
        if (data.teacherMemo !== undefined) setTeacherMemo(data.teacherMemo);
        if (data.teacherMemoFontSize !== undefined) {
           let parsedSize = parseInt(data.teacherMemoFontSize, 10);
           if (isNaN(parsedSize)) parsedSize = 14;
           setTeacherMemoFontSize(parsedSize);
        }
        
        if (data.roleSettings) setRoleSettings(data.roleSettings);
        if (data.shopItems) setShopItems(data.shopItems);
        if (data.customLinks) setCustomLinks(data.customLinks);

        if (data.overviewConfig) setOverviewConfig({ ...defaultOverviewConfig, ...data.overviewConfig });
        if (data.rankingConfigs) setRankingConfigs(data.rankingConfigs);
      };

      useEffect(() => {
        if (!dbUser || !db) return;

        const performMigrationAndLoad = async () => {
          const cached = sessionStorage.getItem('cachedMainState');
          if(cached) {
              applyMainState(JSON.parse(cached));
          }

          try {
            const docRef = doc(db, "classData", "mainState");
            const snap = await getDoc(docRef);
            
            if (snap.exists()) {
              const data = snap.data();
              sessionStorage.setItem('cachedMainState', JSON.stringify(data));
              
              const updates = {};
              let needsUpdate = false;

              if (data.suggestions && Array.isArray(data.suggestions)) {
                for (const s of data.suggestions) { await setDoc(doc(db, "suggestions", String(s.id)), s); }
                updates.suggestions = deleteField(); needsUpdate = true;
              }
              if (data.readingReports && Array.isArray(data.readingReports)) {
                for (const r of data.readingReports) { await setDoc(doc(db, "readingReports", String(r.id)), r); }
                updates.readingReports = deleteField(); needsUpdate = true;
              }
              if (data.savedClassroomSeating) {
                for (const [name, layout] of Object.entries(data.savedClassroomSeating)) { await setDoc(doc(db, "savedClassroomSeating", name), { layout }); }
                updates.savedClassroomSeating = deleteField(); needsUpdate = true;
              }
              if (data.lunchHistory) {
                for (const [date, hist] of Object.entries(data.lunchHistory)) { await setDoc(doc(db, "lunchHistory", date), hist); }
                updates.lunchHistory = deleteField(); needsUpdate = true;
              }

              if (needsUpdate) {
                await updateDoc(docRef, updates);
                invalidateCache();
              }
              
              applyMainState(data);
            }
          } catch (error) { console.error(error); }
          
          loadSavedSeating(); 
          loadLunchHistory();
          setIsDBLoaded(true);

      const getPoints = (val) => {
        if (val === true) return 1;
        if (typeof val === "string" && val.trim() !== "" && val !== "false") {
          if (val.startsWith("[v] ")) {
            return parseInt(val.substring(4).split("_")[0], 10) || 0;
          }
          if (val.startsWith("[-] ")) {
            const rName = val.substring(4);
            const minusVal = roleSettings[rName]?.minus;
            return minusVal !== undefined ? Number(minusVal) : -1;
          }
          if (val.startsWith("[거북이] ")) return parseInt(val.replace("[거북이] ", "")) || 0;
          
          const plusVal = roleSettings[val]?.plus;
          return plusVal !== undefined ? Number(plusVal) : 1;

      const getDetailedScoresByDate = (targetStudentId, baseDateStr) => {
        const baseDate = new Date(baseDateStr); baseDate.setHours(0, 0, 0, 0);
        const diffToMon = baseDate.getDay() === 0 ? -6 : 1 - baseDate.getDay();
        const startOfWeek = new Date(baseDate); startOfWeek.setDate(baseDate.getDate() + diffToMon); startOfWeek.setHours(0, 0, 0, 0);
        const endOfWeek = new Date(startOfWeek); endOfWeek.setDate(startOfWeek.getDate() + 6); endOfWeek.setHours(23, 59, 59, 999);
        const targetMonth = baseDate.getMonth(); const targetYear = baseDate.getFullYear();
        let daily = 0, weekly = 0, monthly = 0, cumulative = 0;
        
        Object.entries(records || {}).forEach(([dateStr, dayRecord]) => {
          if (!dayRecord || typeof dayRecord !== 'object') return;
          const parts = dateStr.split('-'); if (parts.length !== 3) return;
          const recordDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2])); recordDate.setHours(0,0,0,0);
          let pointsThisDay = 0; 
          Object.values(dayRecord).forEach((targets) => { 
            if(!targets || typeof targets !== 'object') return;
            pointsThisDay += getPoints(targets[targetStudentId]); 
          });
          if (pointsThisDay !== 0) {
            cumulative += pointsThisDay;
            if (dateStr === baseDateStr) daily += pointsThisDay;
            if (recordDate >= startOfWeek && recordDate <= endOfWeek) weekly += pointsThisDay;
            if (recordDate.getMonth() === targetMonth && recordDate.getFullYear() === targetYear) monthly += pointsThisDay;
          }
        });
        cumulative += (booksRead || {})[targetStudentId] || 0;
        return { daily, weekly, monthly, cumulative };

          for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
          let hasOverlap = false;
          if (prevArr && prevArr.length > 0) { for (let i = 0; i < shuffled.length; i++) { if (shuffled[i] && prevArr[i] && shuffled[i].id === prevArr[i].id) { hasOverlap = true; break; } } }
          if (!hasOverlap) break; maxAttempts--;
        }
        return shuffled;

                                  <select value={student.gender || "M"} onChange={(e) => handleEditStudent(index, "gender", e.target.value)} className="w-full p-1 bg-transparent border rounded outline-none font-bold text-[10px]">

                                    <option value="F">여</option>

                                <td className="p-1"><input type="text" value={student.password} onChange={(e) => handleEditStudent(index, "password", e.target.value)} className="w-full p-1 text-center bg-transparent outline-none font-mono" /></td>
                                <td className="p-1 text-center"><button type="button" onClick={() => handleRemoveStudent(index)} className="text-gray-400 hover:text-red-500"><UserMinus className="w-3 h-3 mx-auto" /></button></td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                      <div className="mt-2 text-center"><button type="button" onClick={handleAddStudent} className="text-[10px] bg-gray-100 px-2 py-1 rounded font-bold hover:bg-gray-200">+ 학생 추가</button></div>
                    </div>

                          <div className="bg-indigo-50 p-2 rounded-lg border border-indigo-100 mt-2">
                            <h3 className="text-[10px] font-bold text-indigo-800 mb-1">학생 역할 일괄 교체 (기존 ➔ 새 역할)</h3>
                            <div className="flex flex-col gap-1">
                              <select value={renameOldRole} onChange={e=>setRenameOldRole(e.target.value)} className="w-full p-1 text-[9px] rounded border outline-none"><option value="">기존 역할 선택</option>{rolePool.map(r=><option key={r} value={r}>{r}</option>)}</select>

                                <input type="checkbox" checked={renameUpdateHistory} onChange={e=>setRenameUpdateHistory(e.target.checked)} className="w-3 h-3 text-indigo-600 rounded" />

                              <button type="button" onClick={executeRoleRename} className="w-full bg-indigo-600 text-white py-1 rounded text-[9px] font-bold">변경 적용</button>
                            </div>

                        </div>
                      </div>
                    </div>

            </div>
          </div>

                </div>
              </div>
            </div>

              <span className="font-bold text-[10px]">{toastMsg}</span>

            const myInfoId = authStatus.user?.id || 'teacher';

            const isForceAnonymous = sug.id <= ANONYMOUS_CUTOFF;
            const isPri = sug.isAnonymous || isForceAnonymous;
            const isAnnounce = sug.isAnnouncement;
            const displayName = isTeacher ? `${sug.studentName} (${sug.studentId === 'teacher' ? '관리자' : sug.studentId + '번'})` : (isPri ? (String(sug.studentId) === String(myInfoId) ? "나의 비공개 의견" : "비공개") : `${sug.studentName}`);
            
            const parents = (sug.comments || []).filter(c => !c.replyTo);
            const replies = (sug.comments || []).filter(c => c.replyTo);

            return (
              <div className="fixed inset-0 bg-black/60 z-[900] flex items-center justify-center p-4" onClick={() => { setSelectedSuggestionId(null); setReplyingTo(null); }}>

                  <div className={`p-4 border-b ${isAnnounce ? 'bg-rose-50 border-rose-100' : 'bg-purple-50 border-purple-100'} flex justify-between items-start shrink-0`}>
                    <div>
                      <div className="flex items-center gap-2 mb-1.5">
                        {isAnnounce ? <span className="text-[10px] font-black px-2 py-0.5 rounded bg-rose-200 text-rose-800">🚨 공지</span> : <span className={`text-[10px] font-black px-2 py-0.5 rounded ${isPri?"bg-red-200 text-red-800":"bg-indigo-200 text-indigo-800"}`}>{isPri&&<span className="text-red-600 mr-0.5">[비공개]</span>} {displayName}</span>}
                        <span className="text-[10px] text-gray-500">{sug.date}</span>
                      </div>
                      <h2 className="text-lg font-black text-gray-800">{sug.title}</h2>
                    </div>
                    <div className="flex gap-2">
                      {isTeacher && (
                        <button type="button" onClick={(e) => toggleAnnouncement(e, sug.id, isAnnounce)} className={`px-2 py-1.5 rounded transition-colors text-[10px] font-bold border ${isAnnounce ? 'bg-white border-rose-200 text-rose-600 hover:bg-rose-50' : 'bg-white border-indigo-200 text-indigo-600 hover:bg-indigo-50'}`}>
                           {isAnnounce ? "공지 내리기" : "공지 등록"}
                        </button>
                      )}
                      {(isTeacher || String(sug.studentId) === String(myInfoId)) && (
                        <button type="button" onClick={() => deleteSuggestion(sug.id)} className="p-1.5 text-red-500 bg-red-50 rounded hover:bg-red-100 transition-colors" title="게시글 삭제"><Trash2 className="w-4 h-4"/></button>
                      )}
                      <button type="button" onClick={() => { setSelectedSuggestionId(null); setReplyingTo(null); }} className="p-1.5 text-gray-500 bg-gray-100 rounded hover:bg-gray-200 transition-colors" title="닫기"><ChevronDown className="w-4 h-4"/></button>
                    </div>
                  </div>
                  
                  <div className="p-5 overflow-y-auto flex-1 custom-scrollbar bg-white">
                    <div className="whitespace-pre-wrap leading-relaxed text-gray-700 text-sm mb-6 pb-6 border-b border-gray-100">
                      {linkify(sug.text)}
                    </div>
                    
                    <div className="space-y-4">
                      <h3 className="font-bold text-gray-800 flex items-center gap-1.5"><MessageCircle className="w-4 h-4 text-purple-500"/> 댓글 {commentCount}개</h3>

                        {parents.map(p => {
                          const childReplies = replies.filter(r => String(r.replyTo) === String(p.id));
                          return (
                            <div key={p.id} className="mb-4">
                              <div className="bg-gray-50 p-2 rounded-md border border-gray-100 text-[11px]">
                                <div className="flex justify-between items-center mb-1">
                                  <div className="flex items-center gap-2">
                                    <span className={`font-bold ${p.studentId==='teacher'?'text-rose-600':'text-indigo-600'}`}>{p.studentName}</span>
                                    <span className="text-[10px] text-gray-400">{p.date}</span>
                                  </div>
                                  <div className="flex items-center gap-2">
                                    <button type="button" onClick={() => setReplyingTo({sugId: sug.id, commentId: p.id, studentName: p.studentName})} className="text-[10px] text-purple-600 font-bold hover:text-purple-800 transition-colors bg-purple-50 px-1.5 py-0.5 rounded">답글달기</button>

                                      <button type="button" onClick={() => deleteComment(sug.id, p.id)} className="text-gray-400 hover:text-red-500" title="댓글 삭제"><Trash2 className="w-3.5 h-3.5"/></button>
                                    )}
                                  </div>
                                </div>
                                <div className="text-gray-700 whitespace-pre-wrap leading-relaxed">{linkify(p.text)}</div>
                              </div>
                              
                              {childReplies.length > 0 && (
                                <div className="ml-4 mt-1.5 space-y-1 border-l-2 border-purple-100 pl-2">

                                        <div className="flex justify-between items-center mb-1">
                                            <div className="flex items-center gap-1.5">
                                              <CornerDownRight className="w-3 h-3 text-purple-400 shrink-0"/>
                                              <span className={`font-bold ${cr.studentId==='teacher'?'text-rose-600':'text-indigo-600'}`}>{cr.studentName}</span>
                                              <span className="text-[9px] text-gray-400">{cr.date}</span>
                                            </div>
                                            {(isTeacher || String(cr.studentId) === String(myInfoId)) && (
                                              <button type="button" onClick={() => deleteComment(sug.id, cr.id)} className="text-gray-400 hover:text-red-500" title="답글 삭제"><Trash2 className="w-3 h-3"/></button>
                                            )}
                                        </div>
                                        <div className="text-gray-700 whitespace-pre-wrap ml-4">{linkify(cr.text)}</div>
                                      </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          );
                        })}
                        {parents.length === 0 && <p className="text-xs text-gray-400 py-2 text-center">아직 작성된 댓글이 없습니다.</p>}
                      </div>
                    </div>
                  </div>
                  
                  <div className="p-3 bg-gray-50 border-t border-gray-200 flex flex-col shrink-0 transition-all">
                    {replyingTo && replyingTo.sugId === sug.id && (
                        <div className="flex justify-between items-center bg-purple-100 px-3 py-1.5 text-xs text-purple-800 rounded-t-lg border-b border-purple-200">
                          <span className="font-bold flex items-center gap-1"><CornerDownRight className="w-3 h-3" />@{replyingTo.studentName} 님에게 답글 작성 중</span>
                          <button onClick={() => setReplyingTo(null)} className="text-purple-500 hover:text-purple-800 p-0.5"><X className="w-3.5 h-3.5"/></button>
                        </div>
                    )}
                    <div className={`flex gap-2 items-end ${replyingTo && replyingTo.sugId === sug.id ? 'pt-2' : ''}`}>
                      <textarea 
                        value={commentInputs[sug.id]||""} 
                        onChange={(e)=>setCommentInputs({...commentInputs, [sug.id]:e.target.value})} 
                        placeholder={replyingTo && replyingTo.sugId === sug.id ? "답글 내용을 입력하세요..." : "댓글을 길게 입력하세요... (Shift+Enter로 줄바꿈)"}
                        className={`flex-1 p-2 text-sm border border-gray-300 outline-none resize-none h-12 focus:border-purple-400 custom-scrollbar ${replyingTo && replyingTo.sugId === sug.id ? 'rounded-b-lg rounded-tr-lg' : 'rounded-lg'}`}
                        onKeyDown={(e) => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); submitComment(sug.id); } }}
                      />
                      <button type="button" onClick={()=>submitComment(sug.id)} className="bg-purple-600 text-white px-4 py-2 h-12 rounded-lg text-sm font-bold shrink-0 hover:bg-purple-700 transition-colors">등록</button>
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}

          {authStatus.type === "teacher" && (
            <>
              {isSecretModalOpen && (
                <div className="fixed inset-0 bg-black/50 z-[90] flex items-center justify-center p-4">
                  <div className="bg-white rounded-xl p-5 max-w-3xl w-full shadow-2xl">
                    <h3 className="font-bold mb-4 flex items-center gap-2"><Users className="w-5 h-5"/> 비밀 자리(몰래 자리) 세팅</h3>
                    <p className="text-[10px] text-gray-500 mb-3">미리 짜둔 자리를 저장해두고, 학생들 앞에서는 'Ctrl + 자리 뽑기 버튼'을 눌러서 무작위인 척 불러옵니다.</p>
                    <div className="w-full flex justify-center mb-4"><div className="w-1/2 py-1.5 bg-gray-700 text-white text-center rounded-lg font-bold text-[10px]">교 탁</div></div>
                    <div className="grid grid-cols-7 gap-1.5">
                      {tempSecretSeating.map((student, index) => {
                        const isDesk = gridConfig[index] === 1;
                        if (!isDesk) return <div key={index}></div>;
                        return (
                          <div key={index} className="p-1 border rounded-lg aspect-[4/3] flex flex-col justify-center items-center">
                            <select value={student ? student.id : ""} onChange={(e) => {
                              const val = e.target.value;
                              const newArr = [...tempSecretSeating];
                              if (!val) newArr[index] = null;
                              else {
                                const selectedStudent = students.find(s => s.id === parseInt(val));
                                const existIdx = newArr.findIndex(s => s && s.id === selectedStudent.id);
                                if (existIdx !== -1) newArr[existIdx] = null;
                                newArr[index] = selectedStudent;
                              }
                              setTempSecretSeating(newArr);
                            }} className="w-full text-[9px] outline-none font-bold">
                              <option value="">-</option>
                              {students.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                            </select>
                          </div>
                        );
                      })}
                    </div>
                    <div className="mt-5 flex justify-end gap-2">
                      <button type="button" onClick={()=>setIsSecretModalOpen(false)} className="px-4 py-2 bg-gray-100 text-[11px] font-bold rounded hover:bg-gray-200">취소</button>
                      <button type="button" onClick={saveSecretSeating} className="px-4 py-2 bg-indigo-600 text-white text-[11px] font-bold rounded hover:bg-indigo-700">저장</button>
                    </div>
                  </div>
                </div>
              )}

              {tokenManageStudent && (
                <div className="fixed inset-0 bg-black/50 z-[90] flex items-center justify-center p-4">
                  <div className="bg-white rounded-xl p-5 max-w-sm w-full shadow-2xl">
                    <h3 className="font-bold mb-4">{tokenManageStudent.name} 실버 토큰 사용 처리 (수동)</h3>
                    <p className="text-[11px] text-gray-500 mb-2">보상(상품)을 지급한 후, 사용 처리할 실버 총 누적 개수를 입력하세요.</p>
                    <div className="flex gap-2">
                      <input type="number" value={editTokenAmount} onChange={(e) => setEditTokenAmount(parseInt(e.target.value) || 0)} className="border p-2 rounded flex-1 outline-none font-bold text-sm focus:border-blue-500" />
                      <button type="button" onClick={() => {
                        const newSpent = { ...spentTokens, [tokenManageStudent.id]: editTokenAmount };
                        setSpentTokens(newSpent); saveToDB({ spentTokens: newSpent }); setTokenManageStudent(null); showToast("토큰 사용 내역 저장 완료");
                      }} className="bg-blue-600 text-white px-4 py-2 rounded font-bold text-sm hover:bg-blue-700">저장</button>
                    </div>
                    <button type="button" onClick={()=>setTokenManageStudent(null)} className="mt-3 w-full bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded text-xs font-bold">닫기</button>
                  </div>
                </div>
              )}

              {manageGoldTokenOpen && (
                <div className="fixed inset-0 bg-black/50 z-[90] flex items-center justify-center p-4">
                  <div className="bg-white rounded-xl p-5 max-w-sm w-full border-t-4 border-yellow-400 shadow-2xl">
                    <h3 className="font-bold mb-4 flex items-center gap-1.5"><Coins className="w-5 h-5 text-yellow-500"/> 학급 골드 토큰 사용 처리</h3>
                    <p className="text-[11px] text-gray-500 mb-2">학급 전체 보상(파티 등)을 진행한 후, 사용한 총 골드 누적 개수를 입력하세요.</p>
                    <div className="flex gap-2 mb-2">
                      <input type="number" value={editTokenAmount} onChange={(e) => setEditTokenAmount(parseInt(e.target.value) || 0)} className="border p-2 rounded flex-1 outline-none font-bold text-sm focus:border-yellow-500" />
                      <button type="button" onClick={() => { setSpentClassGoldTokens(editTokenAmount); saveToDB({ spentClassGoldTokens: editTokenAmount }); setManageGoldTokenOpen(false); showToast("학급 골드 내역 갱신!"); }} className="bg-yellow-500 text-white px-4 py-2 rounded font-bold text-sm hover:bg-yellow-600">저장</button>
                    </div>
                    <button type="button" onClick={()=>setManageGoldTokenOpen(false)} className="w-full bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded text-xs font-bold mt-1">닫기</button>
                  </div>
                </div>
              )}

              {scoreModalStudent && (
                <div className="fixed inset-0 bg-black/50 z-[90] flex items-center justify-center p-4" onClick={()=>setScoreModalStudent(null)}>
                  <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden" onClick={e=>e.stopPropagation()}>
                    <div className="bg-slate-800 p-4 flex justify-between items-center text-white">
                      <h3 className="font-bold">{scoreModalStudent.id}번 {scoreModalStudent.name} 상세 현황</h3>
                      <button onClick={()=>setScoreModalStudent(null)} className="text-gray-400 hover:text-white"><X className="w-5 h-5"/></button>
                    </div>
                    <div className="p-5 overflow-y-auto max-h-[70vh] custom-scrollbar">
                      <div className="mb-4 bg-gray-50 p-3 rounded-lg border border-gray-200">
                        <div className="flex justify-between items-center mb-1"><span className="text-xs font-bold text-gray-500">현재 역할</span><span className="text-sm font-black text-indigo-700 bg-indigo-50 px-2 py-0.5 rounded">{scoreModalStudent.role}</span></div>
                        <div className="flex justify-between items-center"><span className="text-xs font-bold text-gray-500">누적 획득 점수</span><span className="text-sm font-black text-blue-600">{getCumulativeScore(scoreModalStudent.id)}점</span></div>
                        <div className="flex justify-between items-center mt-1"><span className="text-xs font-bold text-gray-500">보유 실버 토큰</span><span className="text-sm font-black text-yellow-600">{getStudentTokenData(scoreModalStudent.id).silverTokens}개</span></div>
                      </div>
                      <h4 className="text-xs font-bold text-gray-700 mb-2 border-b pb-1">부여받은 상/벌점 출처 분석</h4>
                      <div className="space-y-1">
                        {Object.entries(getCheckerBreakdown(scoreModalStudent.id)).sort((a,b)=>b[1]-a[1]).map(([role, pts], idx) => {
                          if(pts === 0) return null;
                          return (
                            <div key={idx} className="flex justify-between items-center text-[11px] p-1.5 border-b border-gray-100 last:border-0 hover:bg-gray-50 rounded">
                              <span className="text-gray-600 flex items-center gap-1.5"><ShieldCheck className="w-3 h-3 text-slate-400"/> {role}</span>
                              <span className={`font-bold ${pts>0?'text-blue-600':'text-red-500'}`}>{pts>0?`+${pts}`:pts}점</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {selectedRoleStat && (
                <div className="fixed inset-0 bg-black/50 z-[90] flex items-center justify-center p-4" onClick={() => setSelectedRoleStat(null)}>
                  <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden" onClick={e=>e.stopPropagation()}>
                    <div className="bg-indigo-600 p-4 flex justify-between items-center text-white">
                      <h3 className="font-bold flex items-center gap-2"><Trophy className="w-4 h-4"/> [{selectedRoleStat.role}] 수혜자 랭킹</h3>
                      <button onClick={()=>setSelectedRoleStat(null)} className="text-indigo-200 hover:text-white"><X className="w-5 h-5"/></button>
                    </div>
                    <div className="p-4 overflow-y-auto max-h-[60vh] custom-scrollbar space-y-1">
                      {Object.keys(selectedRoleStat.receivers || {}).length === 0 ? <p className="text-center text-xs text-gray-400 py-4">부여 기록이 없습니다.</p> :
                        Object.entries(selectedRoleStat.receivers).sort((a,b)=>b[1]-a[1]).map(([tId, pts], idx) => {
                          const s = students.find(x => x.id === parseInt(tId));
                          if(!s) return null;
                          return (
                            <div key={idx} className="flex justify-between items-center text-[11px] p-2 border-b border-gray-100 last:border-0 hover:bg-indigo-50 rounded">
                              <div className="flex items-center gap-2">
                                <span className="w-5 text-center font-bold text-gray-400">{idx+1}</span>
                                <span className="font-bold text-gray-800">{s.name}</span>
                              </div>
                              <span className={`font-bold ${pts>0?'text-blue-600':'text-red-500'}`}>{pts>0?`+${pts}`:pts}점</span>
                            </div>
                          );
                        })
                      }
                    </div>
                  </div>
                </div>
              )}
            </>
          )}
        </>
      );
    }

    const root = createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
